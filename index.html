<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALI — Workout Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-bg-text">CALITRACK</div>
  <div class="auth-box">
    <div class="auth-logo">CALI<span>TRACK</span></div>
    <p class="auth-sub">// your personal calisthenics log</p>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login', this)">Sign In</button>
      <button class="auth-tab" onclick="switchAuthTab('signup', this)">Sign Up</button>
    </div>

    <div id="auth-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="your@email.com">
      </div>
      <div class="form-group" style="margin-top:0.75rem;">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:1.25rem;" onclick="handleLogin()">Sign In</button>
    </div>

    <div id="auth-signup" style="display:none;">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="your@email.com">
      </div>
      <div class="form-group" style="margin-top:0.75rem;">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Min. 6 characters">
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:1.25rem;" onclick="handleSignup()">Create Account</button>
    </div>

    <div id="auth-error" class="auth-error"></div>
  </div>
</div>

<!-- MAIN APP (hidden until logged in) -->
<div id="app" style="display:none;">

  <!-- NAVBAR -->
  <nav>
    <div class="nav-logo">CALI<span>TRACK</span></div>
    <ul class="nav-links">
      <li><a href="#post" onclick="setActive(this)">Post</a></li>
      <li><a href="#history" onclick="setActive(this)">History</a></li>
    </ul>
    <div class="nav-user">
      <span id="nav-email"></span>
      <button class="btn-signout" onclick="handleSignout()">Sign Out</button>
    </div>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-bg-text">CALISTHENICS</div>
    <h1>TRAIN.<br><em>TRACK.</em><br>DOMINATE.</h1>
    <p>// your personal calisthenics log</p>
  </div>

  <!-- POST SECTION -->
  <section id="post">
    <div class="section-label">// 01</div>
    <div class="section-title">Log Workout</div>

    <div class="card">
      <div class="post-grid">
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="workout-date">
        </div>
        <div class="form-group">
          <label>Notes (optional)</label>
          <input type="text" id="workout-notes" placeholder="e.g. Morning session, felt strong">
        </div>
      </div>

      <div style="margin-top: 1.5rem;">
        <label>Exercises</label>
        <div id="exercise-list"></div>
        <button class="btn btn-secondary" style="margin-top: 0.75rem;" onclick="addExerciseRow()">+ Add Exercise</button>
      </div>

      <hr class="divider" style="margin: 1.5rem 0;">

      <div class="form-group">
        <label>Progress Photos</label>
        <div class="photo-upload-area" id="upload-area">
          <input type="file" id="photo-input" accept="image/*" multiple onchange="handlePhotoUpload(event)">
          <div class="upload-icon">📸</div>
          <p>Drop photos here or click to upload</p>
        </div>
        <div class="photo-preview-grid" id="photo-preview"></div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" id="save-btn" onclick="saveWorkout()">Save Workout</button>
        <button class="btn btn-secondary" onclick="clearForm()">Clear</button>
      </div>
    </div>
  </section>

  <!-- HISTORY SECTION -->
  <section id="history">
    <div class="section-label">// 02</div>
    <div class="section-title">History</div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Total Sessions</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-exercises">0</div><div class="stat-label">Exercises Logged</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-photos">0</div><div class="stat-label">Photos Uploaded</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-streak">0</div><div class="stat-label">Day Streak</div></div>
    </div>

    <div class="history-controls">
      <div class="tab-group">
        <button class="tab-btn active" onclick="setView('day', this)">Day</button>
        <button class="tab-btn" onclick="setView('week', this)">Week</button>
        <button class="tab-btn" onclick="setView('month', this)">Month</button>
      </div>
      <input type="date" id="history-date" class="history-date-input" onchange="renderHistory()">
      <button class="btn btn-secondary btn-today" onclick="jumpToToday()">Today</button>
    </div>

    <div id="history-content"></div>
  </section>

</div><!-- /app -->

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="loading-spinner"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
</body>
</html>
